name: release

# Produces *self-contained* artifacts (Qt bundled in) for every platform — the
# thing the plain `build` workflow does NOT do. `build.yml` only uploads the raw
# binary, which fails to launch on a machine without Qt installed (Windows:
# "missing Qt6Gui.dll"; macOS: missing frameworks / unsigned on Apple Silicon).
#
# Triggers:
#   - push of a tag like v1.2.3  -> builds, packages, and creates a GitHub Release
#                                   with the artifacts attached.
#   - manual run (workflow_dispatch) -> builds and packages; artifacts are
#                                   downloadable from the run, no Release is made.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  QT_VERSION: 6.8.2
  # gha-setup-ninja and msvc-dev-cmd have no Node 24 release yet; force their
  # (and any other) JS actions onto Node 24 so nothing runs on the deprecated
  # Node 20 runtime. The pinned actions below are already Node 24 natively.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Needed for softprops/action-gh-release to create the Release on tag pushes.
permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: build/app/CAMM3.dmg
          - os: ubuntu-22.04
            name: Linux
            artifact: build/CAMM3-x86_64.AppImage
          - os: windows-latest
            name: Windows
            artifact: build/CAMM3-windows.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Same X11/xcb/GL stack the app links against at runtime; plus FUSE, which
      # the linuxdeploy AppImage tools need to run and to build the output
      # AppImage.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-util1 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libfuse2 \
            patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtserialport
          cache: true

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      # The Qt build on Windows is MSVC (win64_msvc2022_64). Activate the MSVC
      # dev environment so the build uses cl.exe AND so windeployqt can locate
      # the VC++ runtime DLLs for --compiler-runtime.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      # --- Package: bundle Qt and produce a distributable artifact ---

      # macdeployqt bundles the frameworks/plugins, the script ad-hoc signs the
      # bundle (mandatory on Apple Silicon) and wraps it in a .dmg.
      - name: Package macOS (.dmg)
        if: runner.os == 'macOS'
        run: packaging/macos.sh

      # windeployqt copies Qt6Gui.dll & friends + plugins next to the .exe and
      # the VC runtime, then zips build/app -> build/CAMM3-windows.zip.
      - name: Package Windows (.zip)
        if: runner.os == 'Windows'
        run: pwsh packaging/windows.ps1

      # linuxdeploy + its Qt plugin bundle Qt into a portable AppImage. Neither
      # ships with Qt, so fetch both release AppImages first. linuxdeploy
      # auto-discovers the qt plugin by name on PATH. APPIMAGE_EXTRACT_AND_RUN
      # lets these AppImage tools run without FUSE on the runner.
      - name: Package Linux (AppImage)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          curl -fsSL -o /usr/local/bin/linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o /usr/local/bin/linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          sudo chmod +x /usr/local/bin/linuxdeploy /usr/local/bin/linuxdeploy-plugin-qt
          LINUXDEPLOY=/usr/local/bin/linuxdeploy packaging/linux.sh "$QT_ROOT_DIR/bin"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: CAMM3-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      # On a tag push, attach the packaged artifact to a GitHub Release. Each
      # matrix job appends its own file to the same Release for the tag.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true
